<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="KM — Gilded Circuit mark">
  <!-- Gilded Circuit favicon: simplified 3-ring variant of the mandala.
       The full medallion muddies below ~180px, so at icon size the mark
       reduces to the via motif -- outer ring with 4 thermal-relief gaps,
       inner ring, vermilion heart. Gold #D4A947 on lacquer #100D0B. -->
  <rect width="64" height="64" rx="14" fill="#100D0B"/>
  <g fill="none" stroke="#D4A947">
    <circle cx="32" cy="32" r="22" stroke-width="4" pathLength="8"
            stroke-dasharray="1.55 0.45" stroke-dashoffset="-0.225"
            transform="rotate(45 32 32)"/>
    <circle cx="32" cy="32" r="12.5" stroke-width="2.5"/>
  </g>
  <circle cx="32" cy="32" r="5" fill="#B8452E"/>
</svg>
