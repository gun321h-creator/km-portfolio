<svg xmlns="http://www.w3.org/2000/svg" width="640" height="640" viewBox="0 0 640 640" role="img" aria-label="มณฑลกนก — Thai kranok flame ornament interwoven with printed-circuit traces, gold on transparent">
  <!-- Gilded Circuit · มณฑลกนก
       Hand-authored. 8-fold radial symmetry via <use>.
       Gold #D4A947 · single vermilion accent #B8452E at the heart + cardinal seeds. -->
  <defs>
    <!-- ══ FANOUT: chip-escape trace, doglegs out to a via, then routes back
         on-axis to feed the kranok cluster. The circuit literally grows the ornament. ══ -->
    <g id="fan" stroke="#D4A947" fill="none" stroke-width="1.5">
      <path d="M 320 282 V 262 L 336 246 V 233"/>
      <circle cx="336" cy="226" r="7"/>
      <circle cx="336" cy="226" r="2.5" fill="#D4A947" stroke="none"/>
      <path d="M 336 219 V 210 L 320 194"/>
      <circle cx="320" cy="194" r="2.5" fill="#D4A947" stroke="none"/>
    </g>

    <!-- ══ KRANOK CLUSTER: central flame tip + mirrored side curls.
         Curl spines terminate in pads (routed ornament). ══ -->
    <g id="kranok-half" fill="none" stroke="#D4A947">
      <!-- main side curl: sweep out, hook back, tight inward spiral -->
      <path stroke-width="2.2" d="M 320 194 C 333 191 344 183 349 169 C 353.5 156.5 349 145 338.5 143.5 C 330.5 142.4 325 148.5 327 156 C 328.5 161.8 335 163 337.7 158.2"/>
      <circle cx="338.2" cy="157.2" r="1.6" fill="#D4A947" stroke="none"/>
      <!-- echo curl (inner shadow line, follows the main curl) -->
      <path stroke-width="1" opacity="0.55" d="M 322.5 188.5 C 332 185.5 340 179.5 344.5 170.5"/>
      <!-- base curl (ตัวเหงา): small spiral hugging the spine -->
      <path stroke-width="1.4" d="M 321 191 C 326.5 187 329.5 181 328.6 174 C 328 168.8 323.8 166.6 321.2 169.6 C 319.4 171.7 320.8 174.8 323.2 174.4"/>
      <!-- secondary flamelet: steep, licks upward-outward from the curl's shoulder -->
      <path fill="#D4A947" stroke="none" d="M 349.5 172 C 356 164 360.5 152 361.5 138 C 362 130 360.5 124.5 357.5 119 C 358.8 130 357 141 352.6 151.5 C 350.3 157.5 349.4 164.5 349.5 172 Z"/>
    </g>
    <g id="kranok">
      <!-- central flame tip: slim leaning leaf, sharp apex -->
      <path fill="#D4A947" stroke="none" d="M 320 108 C 314 122 312.5 137 317.5 151 C 318.6 154.4 319.3 157 318.6 160 C 322.8 156 326.4 147 324.4 137 C 322 125 321.4 116 320 108 Z"/>
      <!-- spine: S-curve linking tip to the routed base point -->
      <path fill="none" stroke="#D4A947" stroke-width="2" d="M 318.4 154 C 314.5 166 315.5 180 320 194"/>
      <use href="#kranok-half"/>
      <use href="#kranok-half" transform="matrix(-1 0 0 1 640 0)"/>
    </g>

    <!-- ══ BUS: three parallel traces with a 45° jog, SMD pads outboard,
         test-point dots inboard. Sits between kranok clusters. ══ -->
    <g id="bus" stroke="#D4A947" fill="none" stroke-width="1.25">
      <path d="M 312 176 V 152 L 304 144 V 128"/>
      <path d="M 320 176 V 152 L 312 144 V 128"/>
      <path d="M 328 176 V 152 L 320 144 V 128"/>
      <g fill="#D4A947" stroke="none">
        <rect x="300.5" y="119" width="7" height="7"/>
        <rect x="308.5" y="119" width="7" height="7"/>
        <rect x="316.5" y="119" width="7" height="7"/>
        <circle cx="312" cy="179" r="2"/>
        <circle cx="320" cy="179" r="2"/>
        <circle cx="328" cy="179" r="2"/>
      </g>
    </g>

    <!-- ══ CROWN (ยอด): cardinal spire — diamond pad + flame finial + flanking pads ══ -->
    <g id="crown">
      <path fill="none" stroke="#D4A947" stroke-width="1.5" d="M 320 58 L 330 68 L 320 78 L 310 68 Z"/>
      <circle cx="320" cy="68" r="2" fill="#B8452E"/>
      <path fill="#D4A947" d="M 320 24 C 315.8 34 314.2 43 317 52 C 317.8 55 318.4 57.2 318 59.6 C 321.8 56.6 324.6 48.6 322.8 40 C 321.4 32.6 320.9 28.6 320 24 Z"/>
      <circle cx="301" cy="80" r="2.5" fill="#D4A947"/>
      <circle cx="339" cy="80" r="2.5" fill="#D4A947"/>
    </g>
  </defs>

  <!-- ════════ RINGS (background structure, drawn first) ════════ -->
  <g fill="none" stroke="#D4A947">
    <!-- guard ring around the die -->
    <circle cx="320" cy="320" r="56" stroke-width="1" opacity="0.5" pathLength="8" stroke-dasharray="0.82 0.18" stroke-dashoffset="0.41"/>
    <!-- ring bus joining the eight cluster bases -->
    <circle cx="320" cy="320" r="126" stroke-width="1" opacity="0.35"/>
    <!-- silk ring -->
    <circle cx="320" cy="320" r="216" stroke-width="1" opacity="0.5"/>
    <!-- ประคำ bead ring: 108 dots -->
    <circle cx="320" cy="320" r="228" stroke-width="3.2" stroke-linecap="round" pathLength="108" stroke-dasharray="0 1" opacity="0.9"/>
    <!-- gapped track ring — gaps open at the cardinals for the crowns -->
    <circle cx="320" cy="320" r="240" stroke-width="1.25" pathLength="8" stroke-dasharray="1.55 0.45" stroke-dashoffset="0.775" opacity="0.8"/>
    <!-- outer boundary -->
    <circle cx="320" cy="320" r="308" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- ════════ CENTER DIE (แก้วกลาง) ════════ -->
  <g fill="none" stroke="#D4A947">
    <path stroke-width="2" d="M 320 284 L 356 320 L 320 356 L 284 320 Z"/>
    <path stroke-width="1.25" opacity="0.7" d="M 320 298 L 342 320 L 320 342 L 298 320 Z"/>
    <circle cx="320" cy="320" r="10" stroke-width="1.5"/>
    <g fill="#D4A947" stroke="none">
      <circle cx="320" cy="284" r="2.5"/>
      <circle cx="356" cy="320" r="2.5"/>
      <circle cx="320" cy="356" r="2.5"/>
      <circle cx="284" cy="320" r="2.5"/>
    </g>
  </g>
  <circle cx="320" cy="320" r="4.5" fill="#B8452E"/>

  <!-- ════════ FANOUT ×8 (pinwheel) ════════ -->
  <use href="#fan"/>
  <use href="#fan" transform="rotate(45 320 320)"/>
  <use href="#fan" transform="rotate(90 320 320)"/>
  <use href="#fan" transform="rotate(135 320 320)"/>
  <use href="#fan" transform="rotate(180 320 320)"/>
  <use href="#fan" transform="rotate(225 320 320)"/>
  <use href="#fan" transform="rotate(270 320 320)"/>
  <use href="#fan" transform="rotate(315 320 320)"/>

  <!-- ════════ KRANOK ×8 ════════ -->
  <use href="#kranok"/>
  <use href="#kranok" transform="rotate(45 320 320)"/>
  <use href="#kranok" transform="rotate(90 320 320)"/>
  <use href="#kranok" transform="rotate(135 320 320)"/>
  <use href="#kranok" transform="rotate(180 320 320)"/>
  <use href="#kranok" transform="rotate(225 320 320)"/>
  <use href="#kranok" transform="rotate(270 320 320)"/>
  <use href="#kranok" transform="rotate(315 320 320)"/>

  <!-- ════════ BUS ×8 (offset 22.5°) ════════ -->
  <use href="#bus" transform="rotate(22.5 320 320)"/>
  <use href="#bus" transform="rotate(67.5 320 320)"/>
  <use href="#bus" transform="rotate(112.5 320 320)"/>
  <use href="#bus" transform="rotate(157.5 320 320)"/>
  <use href="#bus" transform="rotate(202.5 320 320)"/>
  <use href="#bus" transform="rotate(247.5 320 320)"/>
  <use href="#bus" transform="rotate(292.5 320 320)"/>
  <use href="#bus" transform="rotate(337.5 320 320)"/>

  <!-- ════════ CROWNS ×4 (cardinals) ════════ -->
  <use href="#crown"/>
  <use href="#crown" transform="rotate(90 320 320)"/>
  <use href="#crown" transform="rotate(180 320 320)"/>
  <use href="#crown" transform="rotate(270 320 320)"/>
</svg>
