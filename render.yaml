# Render free web service. GUN connects the public repo in the Render
# dashboard (Phase D); Render reads this file to build + start.
services:
  - type: web
    name: km-portfolio
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn portfolio_app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /portfolio
